version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: guardianshield
      POSTGRES_USER: shield_user
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "5433:5432"

  pgadmin:
      image: dpage/pgadmin4
      environment:
        PGADMIN_DEFAULT_EMAIL: admin@admin.com
        PGADMIN_DEFAULT_PASSWORD: admin
      ports:
        - "8081:80"

  app:
    build: .
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/guardianshield